<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Smart Light Detector - Ultimate</title>
    <style>
        :root {
            --bg: #05070a;
            --on-color: #00ff88;
            --off-color: #ff3333;
            --accent: #00f2ff;
            --card-bg: rgba(255, 255, 255, 0.03);
        }

        body { 
            font-family: 'Inter', system-ui, -apple-system, sans-serif; 
            text-align: center; 
            background: var(--bg); 
            color: #ffffff; 
            margin: 0; 
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h2 { 
            font-weight: 900; 
            letter-spacing: 2px; 
            margin-bottom: 25px; 
            text-transform: uppercase;
            background: linear-gradient(to right, var(--accent), #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .main-card {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.08);
            padding: 24px;
            border-radius: 30px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            max-width: 450px;
            width: 90%;
        }

        #video-container { 
            position: relative; 
            width: 100%;
            border-radius: 20px; 
            overflow: hidden; 
            background: #000;
            border: 2px solid rgba(255,255,255,0.1);
            line-height: 0;
        }

        video { width: 100%; height: auto; display: block; filter: contrast(1.1); }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        .status-display { 
            margin: 25px 0; 
            padding: 25px; 
            border-radius: 20px; 
            font-size: 2.2rem; 
            font-weight: 900; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            letter-spacing: 4px;
            border: 3px solid transparent;
        }

        .nyala { 
            background: rgba(0, 255, 136, 0.1); 
            color: var(--on-color); 
            border-color: var(--on-color);
            box-shadow: 0 0 50px rgba(0, 255, 136, 0.4);
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
        }

        .mati { 
            background: rgba(255, 51, 51, 0.1); 
            color: var(--off-color); 
            border-color: var(--off-color);
            box-shadow: 0 0 40px rgba(255, 51, 51, 0.3);
            text-shadow: 0 0 10px rgba(255, 51, 51, 0.5);
        }

        .meter-wrapper { margin: 20px 0; text-align: left; }
        .meter-label { font-size: 0.75rem; color: #666; margin-bottom: 8px; font-weight: bold; letter-spacing: 1px; }
        .meter-container { 
            width: 100%; 
            background: #111; 
            border-radius: 50px; 
            height: 10px; 
            overflow: hidden; 
            border: 1px solid #222;
        }
        #meter { 
            height: 100%; 
            width: 0%; 
            background: linear-gradient(90deg, #111, var(--accent)); 
            transition: width 0.1s ease;
        }

        button { 
            background: #fff;
            color: #000; 
            border: none; 
            padding: 18px; 
            border-radius: 18px; 
            font-weight: 800; 
            cursor: pointer; 
            transition: all 0.3s;
            width: 100%;
            font-size: 1rem;
            text-transform: uppercase;
        }

        button:hover { background: var(--accent); transform: scale(1.02); }

        .debug-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 20px;
            font-family: monospace;
            font-size: 0.7rem;
            color: #444;
        }
        .debug-item { background: rgba(0,0,0,0.2); padding: 10px; border-radius: 12px; }
    </style>
</head>
<body>

    <h2>LUX MONITOR <small style="color: var(--accent); font-size: 0.4em;">V3.9 PRO</small></h2>
    
    <div class="main-card">
        <div id="video-container">
            <video id="video" autoplay playsinline></video>
            <canvas id="canvas"></canvas>
        </div>

        <div class="meter-wrapper">
            <div class="meter-label">SENSOR INTENSITY</div>
            <div class="meter-container">
                <div id="meter"></div>
            </div>
        </div>

        <div id="status" class="status-display mati">OFF</div>

        <button onclick="calibrate()">⚡ CALIBRATE SENSOR</button>
        
        <div class="debug-grid">
            <div class="debug-item">RAW: <span id="val" style="color:#eee">0</span></div>
            <div class="debug-item">LIMIT: <span id="thresh" style="color:var(--accent)">50</span></div>
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const statusDiv = document.getElementById('status');
        const meter = document.getElementById('meter');
        const valDisp = document.getElementById('val');
        const threshDisp = document.getElementById('thresh');

        let threshold = 50;

        async function init() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "environment" },
                    audio: false
                });
                video.srcObject = stream;
                requestAnimationFrame(analyze);
            } catch (e) {
                statusDiv.innerText = "NO CAMERA";
            }
        }

        function calibrate() {
            const currentVal = parseInt(valDisp.innerText);
            threshold = currentVal + 25; 
            threshDisp.innerText = threshold;
        }

        function analyze() {
            if (video.videoWidth > 0) {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                
                const size = 130;
                const x = (canvas.width/2) - (size/2);
                const y = (canvas.height/2) - (size/2);
                const pixels = ctx.getImageData(x, y, size, size).data;

                let greenSum = 0;
                for (let i = 0; i < pixels.length; i += 4) {
                    greenSum += pixels[i + 1]; 
                }

                const brightness = Math.round(greenSum / (size * size));
                valDisp.innerText = brightness;
                meter.style.width = Math.min((brightness / 255) * 100, 100) + "%";

                // DI SINI PERBAIKANNYA: Reset status canvas style setiap frame baru digambar
                ctx.setLineDash([8, 8]);
                ctx.lineWidth = 6;

                if (brightness > threshold) {
                    statusDiv.innerText = "ON";
                    statusDiv.className = "status-display nyala";
                    
                    // Set warna kotak tengah jadi Hijau Neon
                    ctx.strokeStyle = "#00ff88";
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = "#00ff88";
                } else {
                    statusDiv.innerText = "OFF";
                    statusDiv.className = "status-display mati";
                    
                    // Set warna kotak tengah jadi Merah Menyala
                    ctx.strokeStyle = "#ff3333";
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = "#ff3333";
                }

                // Gambar kotaknya setelah warna (strokeStyle) dipastikan berubah
                ctx.strokeRect(x, y, size, size);
                
                // Reset shadow biar ga bocor ke draw selanjutnya
                ctx.shadowBlur = 0;
            }
            requestAnimationFrame(analyze);
        }

        init();
    </script>
</body>
</html>
