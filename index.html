<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Smart Light Detector - Pure Analytics</title>
    <style>
        :root {
            --bg: #05070a;
            --on-color: #00ff88;
            --off-color: #ff3333;
            --accent: #00f2ff;
            --card-bg: rgba(255, 255, 255, 0.03);
        }

        body { 
            font-family: 'Inter', system-ui, -apple-system, sans-serif; 
            text-align: center; 
            background: var(--bg); 
            color: #ffffff; 
            margin: 0; 
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h2 { 
            font-weight: 900; 
            letter-spacing: 2px; 
            margin-bottom: 25px; 
            text-transform: uppercase;
            background: linear-gradient(to right, var(--accent), #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .main-card {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.08);
            padding: 24px;
            border-radius: 30px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            max-width: 450px;
            width: 90%;
        }

        #video-container { 
            position: relative; 
            width: 100%;
            border-radius: 20px; 
            overflow: hidden; 
            background: #000;
            border: 2px solid rgba(255,255,255,0.1);
            line-height: 0;
        }

        video { width: 100%; height: auto; display: block; filter: contrast(1.1); }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        .status-display { 
            margin: 15px 0 5px 0; 
            padding: 30px; 
            border-radius: 20px; 
            font-size: 2.5rem; 
            font-weight: 900; 
            transition: all 0.3s ease;
            letter-spacing: 6px;
            border: 3px solid transparent;
        }

        .nyala { 
            background: rgba(0, 255, 136, 0.1); 
            color: var(--on-color); 
            border-color: var(--on-color);
            box-shadow: 0 0 50px rgba(0, 255, 136, 0.4);
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
        }

        .mati { 
            background: rgba(255, 51, 51, 0.1); 
            color: var(--off-color); 
            border-color: var(--off-color);
            box-shadow: 0 0 40px rgba(255, 51, 51, 0.3);
            text-shadow: 0 0 10px rgba(255, 51, 51, 0.5);
        }
    </style>
</head>
<body>

    <h2>LUX MONITOR <small style="color: var(--accent); font-size: 0.4em;">V8.0 PURE</small></h2>
    
    <div class="main-card">
        <div id="video-container">
            <video id="video" autoplay playsinline></video>
            <canvas id="canvas"></canvas>
        </div>

        <div id="status" class="status-display mati">OFF</div>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const statusDiv = document.getElementById('status');

        async function init() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "environment" },
                    audio: false
                });
                video.srcObject = stream;
                requestAnimationFrame(analyze);
            } catch (e) {
                statusDiv.innerText = "NO CAMERA";
            }
        }

        function analyze() {
            if (video.videoWidth > 0) {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                
                const size = 140; 
                const x = (canvas.width/2) - (size/2);
                const y = (canvas.height/2) - (size/2);
                const pixels = ctx.getImageData(x, y, size, size).data;

                let maxB = 0;
                let minB = 255;
                let totalB = 0;
                let count = 0;

                for (let i = 0; i < pixels.length; i += 4) {
                    const r = pixels[i];
                    const g = pixels[i + 1];
                    const b = pixels[i + 2];
                    
                    // Rumus sensitivitas cahaya murni
                    const brightness = (r * 0.299 + g * 0.587 + b * 0.114);
                    
                    if (brightness > maxB) maxB = brightness;
                    if (brightness < minB) minB = brightness;
                    totalB += brightness;
                    count++;
                }

                const avgB = totalB / count;
                
                // Menghitung variasi kontras tajam di area lampu
                const localContrast = maxB - avgB;

                ctx.setLineDash([6, 6]);
                ctx.lineWidth = 5;

                // LOGIKA ANTI-CAHAYA JENDELA / ANTI-PANTULAN:
                // Lampu benar-benar NYALA jika ada titik silau (maxB > 200) DAN kontrasnya sangat tajam (localContrast > 75)
                if (maxB > 200 && localContrast > 75) {
                    statusDiv.innerText = "ON";
                    statusDiv.className = "status-display nyala";
                    ctx.strokeStyle = "#00ff88";
                    ctx.shadowBlur = 20;
                    ctx.shadowColor = "#00ff88";
                } else {
                    statusDiv.innerText = "OFF";
                    statusDiv.className = "status-display mati";
                    ctx.strokeStyle = "#ff3333";
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = "#ff3333";
                }

                ctx.strokeRect(x, y, size, size);
                ctx.shadowBlur = 0;
            }
            requestAnimationFrame(analyze);
        }

        init();
    </script>
</body>
</html>
