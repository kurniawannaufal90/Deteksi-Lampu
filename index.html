<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Smart Lamp Detector</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0b0f19;
    font-family:Arial, sans-serif;
    color:white;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

.container{
    width:370px;
    padding:20px;
    border-radius:28px;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,0.08);
    box-shadow:
    0 0 40px rgba(0,0,0,0.6);
}

.header{
    margin-bottom:20px;
}

.header h1{
    font-size:24px;
}

.header p{
    color:#8b93a7;
    margin-top:5px;
    font-size:14px;
}

.camera-box{
    position:relative;
    overflow:hidden;
    border-radius:22px;
    background:black;
}

video{
    width:100%;
    display:block;
    object-fit:cover;
}

.overlay{
    position:absolute;
    inset:0;
    border:1px solid rgba(255,255,255,0.08);
    border-radius:22px;
    pointer-events:none;
}

.scan-line{
    position:absolute;
    width:100%;
    height:2px;
    background:#00ffae;
    box-shadow:0 0 15px #00ffae;
    animation:scan 2s linear infinite;
}

@keyframes scan{
    0%{
        top:0%;
    }

    100%{
        top:100%;
    }
}

.status-card{
    margin-top:20px;
    background:rgba(255,255,255,0.04);
    border-radius:22px;
    padding:18px;
    border:1px solid rgba(255,255,255,0.06);
}

.status-top{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.status-text{
    font-size:22px;
    font-weight:bold;
}

.indicator{
    width:15px;
    height:15px;
    border-radius:50%;
    background:red;
    box-shadow:0 0 15px red;
    transition:0.3s;
}

.desc{
    margin-top:10px;
    color:#9aa3b2;
    font-size:14px;
    line-height:1.5;
}

.bar{
    width:100%;
    height:10px;
    background:#1a2233;
    border-radius:30px;
    margin-top:18px;
    overflow:hidden;
}

.fill{
    width:0%;
    height:100%;
    border-radius:30px;
    background:linear-gradient(
        90deg,
        #00ffae,
        #00c3ff
    );
    transition:0.3s;
}

.percent{
    margin-top:8px;
    text-align:right;
    font-size:13px;
    color:#7e8797;
}

.footer{
    margin-top:18px;
    text-align:center;
    color:#5f6775;
    font-size:12px;
}

</style>
</head>
<body>

<div class="container">

    <div class="header">
        <h1>Smart Lamp Detector</h1>
        <p>Rear Camera AI Light Recognition</p>
    </div>

    <div class="camera-box">

        <video id="video" autoplay playsinline></video>

        <div class="overlay"></div>

        <div class="scan-line"></div>

    </div>

    <div class="status-card">

        <div class="status-top">

            <div class="status-text" id="status">
                Detecting...
            </div>

            <div class="indicator" id="indicator"></div>

        </div>

        <div class="desc" id="desc">
            Scanning room lighting...
        </div>

        <div class="bar">
            <div class="fill" id="fill"></div>
        </div>

        <div class="percent" id="percent">
            0%
        </div>

    </div>

    <div class="footer">
        Artificial Light Detection System
    </div>

</div>

<canvas
id="canvas"
width="300"
height="200"
style="display:none;">
</canvas>

<script>

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const statusText = document.getElementById("status");
const desc = document.getElementById("desc");
const indicator = document.getElementById("indicator");
const fill = document.getElementById("fill");
const percent = document.getElementById("percent");

async function startCamera(){

    try{

        // Paksa kamera belakang
        const stream =
        await navigator.mediaDevices.getUserMedia({

            video:{
                facingMode:{
                    exact:"environment"
                },
                width:{ideal:1280},
                height:{ideal:720}
            },

            audio:false

        });

        video.srcObject = stream;

        setInterval(analyzeFrame,500);

    }

    catch(err){

        // Fallback kalau exact gagal
        try{

            const fallback =
            await navigator.mediaDevices.getUserMedia({

                video:{
                    facingMode:"environment"
                }

            });

            video.srcObject = fallback;

            setInterval(analyzeFrame,500);

        }

        catch(e){

            alert(
                "Kamera belakang tidak bisa diakses"
            );

        }

    }

}

startCamera();

function analyzeFrame(){

    ctx.drawImage(
        video,
        0,
        0,
        300,
        200
    );

    const frame = ctx.getImageData(
        0,
        0,
        300,
        200
    );

    const data = frame.data;

    let brightness = 0;
    let lampPixels = 0;

    for(let i=0;i<data.length;i+=4){

        const r = data[i];
        const g = data[i+1];
        const b = data[i+2];

        const avg = (r+g+b)/3;

        brightness += avg;

        // Karakter warna lampu
        if(
            r > 140 &&
            g > 120 &&
            b < 180
        ){
            lampPixels++;
        }

    }

    brightness /= (data.length/4);

    const lampRatio =
        lampPixels / (data.length/4);

    const level =
        Math.min(
            100,
            Math.floor(brightness)
        );

    fill.style.width =
        level + "%";

    percent.innerHTML =
        level + "% Brightness";

    // =======================
    // DETEKSI LAMPU
    // =======================

    if(
        brightness > 60 &&
        lampRatio > 0.08
    ){

        statusText.innerHTML =
            "Lamp ON";

        desc.innerHTML =
            "Artificial room light detected.";

        indicator.style.background =
            "#00ff99";

        indicator.style.boxShadow =
            "0 0 18px #00ff99";

    }

    else{

        statusText.innerHTML =
            "Lamp OFF";

        desc.innerHTML =
            "No artificial light detected.";

        indicator.style.background =
            "#ff3b3b";

        indicator.style.boxShadow =
            "0 0 18px #ff3b3b";

    }

}

</script>

</body>
</html>
